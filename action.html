<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <script src="https://cdn.jsdelivr.net/gh/feraxhp/thselector@v0.1.0/load-theme.js"></script>
        <style>
            body {
                font-family: sans-serif;
            }
            a {
                text-decoration: none;
                padding: 8px 12px;
                border-radius: 5px;
                color: white;
                display: inline-block;
                margin-bottom: 10px;
                width: 100%
            }
            #popout {
                background-color: #4caf50; /* Verde */
            }
            #linkify {
                background-color: #2196f3; /* Azul */
                vertical-align: middle;
            }
        </style>
    </head>
    <body>
        <div><a id="popout" href="#">Open as web app</a></div>
        <div>
            <a id="linkify" href="#">Open from clipboard <span>📥</span></a>
        </div>
        <script src="action.js"></script>
    </body>
</html>

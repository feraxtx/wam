name: Publish Addon
run-name: 🚀 Publising Addon 🚀
on:
    workflow_dispatch:
    workflow_call:
    release:
      types:
        - created

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
  sample:
    runs-on: ubuntu-latest
    steps:

      - name: 🗃️ Checkout code
        uses: actions/checkout@v4
      
      - name: 📦 Install npm dependencies
        shell: bash
        run: npm install --global web-ext
      
      - name: 🧩 Lint Addon
        shell: bash
        run: web-ext lint
        
      - name: 🧩 Build Addon
        shell: bash
        run: web-ext build

      - name: 📤 Publish Addon
        shell: bash
        run: |
          web-ext sign --api-key="${{ secrets.AMO_API_KEY }}" --api-secret="${{ secrets.AMO_API_SECRET }}" --channel=listed --amo-metadata=metadata.json --approval-timeout=0

